version: '3'

# Tasks for the umbreon Embree renderer + benchmark CLI.
# Requires go-task (https://taskfile.dev): brew install go-task
# Also requires Ninja and a C++17 compiler (on Windows: an MSVC environment).

env:
  # Build with Ninja (single-config) on every OS. The Windows default generator
  # is Visual Studio (multi-config), whose default config is Debug; linking that
  # against the prebuilt Release deplibs mixes CRTs. Ninja honors
  # CMAKE_BUILD_TYPE=Release, matching the static libs on all platforms. Export
  # CMAKE_GENERATOR yourself to override.
  CMAKE_GENERATOR:
    sh: 'echo "${CMAKE_GENERATOR:-Ninja}"'

vars:
  # Upstream versions for the FROM-SOURCE fallback only (deps:build-* on platforms
  # without a published deplibs bundle). The deplibs path does NOT use these: it
  # reads the bundled component versions from target/deplibs.env (EMBREE_VER /
  # TBB_VER) and builds the prefix paths from those, so the version lives in one
  # place (the released bundle) and bumping DEPLIBS_VERSION is enough.
  EMBREE_VERSION: "4.4.1"
  TBB_VERSION: "2023.0.0"
  DEPS_SRC: "{{.ROOT_DIR}}/deps/src"
  DEPS_PREFIX: "{{.ROOT_DIR}}/deps/prefix"
  # CueMol2 deplibs: prebuilt static Embree/TBB (+CGAL/OIDN/...) for Linux x64,
  # macOS x64/arm64 and Windows x64. Each component ships its own CMake package
  # config under target/<component>-<ver>/lib/cmake; component versions are listed
  # in target/deplibs.env. Bumping DEPLIBS_VERSION re-fetches (version marker).
  DEPLIBS_VERSION: "v0.1.0"
  DEPLIBS_DIR: "{{.ROOT_DIR}}/deps/deplibs"
  DEPLIBS_ENV: "{{.DEPLIBS_DIR}}/target/deplibs.env"

tasks:
  deps:
    desc: Install dependencies (Embree 4 + TBB; POV-Ray only to regenerate references)
    cmds:
      - |
        if [ "{{OS}}" = "darwin" ]; then
          brew install embree tbb ninja povray
        elif command -v apt-get >/dev/null 2>&1; then
          sudo apt-get install -y libembree-dev libtbb-dev ninja-build povray
        else
          echo "Unsupported platform; install Embree 4, TBB, Ninja and (optionally) POV-Ray manually." >&2
          exit 1
        fi

  deps:fetch:
    desc: Download CueMol2 deplibs ({{.DEPLIBS_VERSION}} prebuilt static Embree/TBB) into deps/deplibs
    cmds:
      # deplibs is published for Linux x64, macOS x64/arm64 and Windows x64.
      # Select the matching bundle; fall back with a hint on other platforms.
      # Download to a file and unpack with `cmake -E tar` (libarchive) instead of
      # piping into the shell's tar: go-task's built-in shell uses its own tar on
      # Windows that rejects the bare `tar xj` form, and cmake is required anyway.
      - |
        case "{{OS}}/{{ARCH}}" in
          linux/amd64)   asset=deplibs_Linux_X64.tar.bz2 ;;
          darwin/amd64)  asset=deplibs_macOS_X64.tar.bz2 ;;
          darwin/arm64)  asset=deplibs_macOS_ARM64.tar.bz2 ;;
          windows/amd64) asset=deplibs_Windows_X64.tar.bz2 ;;
          *)
            echo "No deplibs bundle is published for {{OS}}/{{ARCH}}." >&2
            echo "Use 'task deps:build' (build from source) or 'task deps' (system packages) instead." >&2
            exit 1 ;;
        esac
        # The bundle also carries CGAL/OIDN etc.; umbreon only consumes embree/tbb.
        # Drop any previously-extracted (possibly older) bundle so a version bump
        # cannot leave stale component dirs behind.
        cmake -E rm -rf "{{.DEPLIBS_DIR}}/target"
        cmake -E make_directory "{{.DEPLIBS_DIR}}"
        curl -sL "https://github.com/CueMol/build_scripts/releases/download/{{.DEPLIBS_VERSION}}/$asset" -o "{{.DEPLIBS_DIR}}/deplibs.tar.bz2"
        cmake -E chdir "{{.DEPLIBS_DIR}}" cmake -E tar xjf "deplibs.tar.bz2"
        cmake -E remove "{{.DEPLIBS_DIR}}/deplibs.tar.bz2"
        # Record which release is extracted so the status check below re-fetches
        # when DEPLIBS_VERSION changes (the component dir names alone don't move
        # if only the bundle, not embree/tbb, was rebuilt).
        echo "{{.DEPLIBS_VERSION}}" > "{{.DEPLIBS_DIR}}/target/.deplibs_version"
    status:
      - test "$(cat {{.DEPLIBS_DIR}}/target/.deplibs_version 2>/dev/null)" = "{{.DEPLIBS_VERSION}}"

  deps:build-tbb:
    desc: Build oneTBB {{.TBB_VERSION}} as a static library into deps/prefix
    cmds:
      - mkdir -p {{.DEPS_SRC}}
      - |
        if [ ! -d "{{.DEPS_SRC}}/oneTBB-{{.TBB_VERSION}}" ]; then
          curl -sL "https://github.com/uxlfoundation/oneTBB/archive/refs/tags/v{{.TBB_VERSION}}.tar.gz" \
            | tar xz -C {{.DEPS_SRC}}
        fi
      - >-
        cmake -S {{.DEPS_SRC}}/oneTBB-{{.TBB_VERSION}} -B {{.DEPS_SRC}}/oneTBB-{{.TBB_VERSION}}/build
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX={{.DEPS_PREFIX}}
        -DBUILD_SHARED_LIBS=OFF
        -DTBB_TEST=OFF
        -DTBB_STRICT=OFF
        -DCMAKE_POSITION_INDEPENDENT_CODE=ON
      - cmake --build {{.DEPS_SRC}}/oneTBB-{{.TBB_VERSION}}/build -j
      - cmake --install {{.DEPS_SRC}}/oneTBB-{{.TBB_VERSION}}/build
    status:
      - test -f {{.DEPS_PREFIX}}/lib/libtbb.a

  deps:build-embree:
    desc: Build Embree {{.EMBREE_VERSION}} as a static library into deps/prefix
    deps: [deps:build-tbb]
    cmds:
      - mkdir -p {{.DEPS_SRC}}
      - |
        if [ ! -d "{{.DEPS_SRC}}/embree-{{.EMBREE_VERSION}}" ]; then
          curl -sL "https://github.com/RenderKit/embree/archive/refs/tags/v{{.EMBREE_VERSION}}.tar.gz" \
            | tar xz -C {{.DEPS_SRC}}
        fi
      - >-
        cmake -S {{.DEPS_SRC}}/embree-{{.EMBREE_VERSION}} -B {{.DEPS_SRC}}/embree-{{.EMBREE_VERSION}}/build
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX={{.DEPS_PREFIX}}
        -DCMAKE_PREFIX_PATH={{.DEPS_PREFIX}}
        -DBUILD_SHARED_LIBS=OFF
        -DEMBREE_STATIC_LIB=ON
        -DEMBREE_TUTORIALS=OFF
        -DEMBREE_ISPC_SUPPORT=OFF
        -DCMAKE_POSITION_INDEPENDENT_CODE=ON
      - cmake --build {{.DEPS_SRC}}/embree-{{.EMBREE_VERSION}}/build -j
      - cmake --install {{.DEPS_SRC}}/embree-{{.EMBREE_VERSION}}/build
    status:
      - test -f {{.DEPS_PREFIX}}/lib/libembree4.a

  deps:build:
    desc: Build both TBB and Embree as static libraries into deps/prefix
    deps: [deps:build-embree]

  configure:static:
    internal: true
    # Resolve static Embree/TBB -- CueMol deplibs release {{.DEPLIBS_VERSION}} on
    # the published platforms (Linux/macOS/Windows x64 + macOS arm64), source-built
    # static libs elsewhere -- and configure build/ against them. `-U` clears any
    # cached package dirs so a build/ previously configured for system libs is
    # re-resolved to the deplibs prefix (find_package CONFIG otherwise reuses the
    # stale *_DIR cache and ignores CMAKE_PREFIX_PATH).
    cmds:
      - |
        set -e
        OIDN_FLAG=-DUMBREON_WITH_OIDN=OFF
        case "{{OS}}/{{ARCH}}" in
          linux/amd64|darwin/amd64|darwin/arm64|windows/amd64)
            task deps:fetch
            # Component versions come from the bundle itself, not hardcoded vars.
            . "{{.DEPLIBS_ENV}}"
            PREFIX="{{.DEPLIBS_DIR}}/target/embree-${EMBREE_VER};{{.DEPLIBS_DIR}}/target/tbb-${TBB_VER};{{.DEPLIBS_DIR}}/target/oidn-${OIDN_VER}"
            # The bundle ships OIDN; enable the optional backend against it.
            OIDN_FLAG=-DUMBREON_WITH_OIDN=ON ;;
          *)
            task deps:build
            PREFIX="{{.DEPS_PREFIX}}" ;;
        esac
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX" \
          "$OIDN_FLAG" -Uembree_DIR -UTBB_DIR -UOpenImageDenoise_DIR

  build:static:
    desc: Build against static Embree/TBB from CueMol deplibs (alias of `build`; used by CI)
    cmds:
      - task: configure:static
      - cmake --build build -j

  test:static:
    desc: Build and test against static Embree/TBB from CueMol deplibs (alias of `test`; used by CI)
    cmds:
      - task: configure:static
      - cmake --build build -j
      - ctest --test-dir build --output-on-failure

  build:
    desc: Configure (static Embree/TBB via CueMol deplibs {{.DEPLIBS_VERSION}}) and build (Release)
    cmds:
      - task: configure:static
      - cmake --build build -j

  test:
    desc: Build (static deplibs) and run the unit / integration tests
    cmds:
      - task: configure:static
      - cmake --build build -j
      - ctest --test-dir build --output-on-failure

  build:system:
    desc: Build against system-installed Embree/TBB (apt/brew); no deplibs download
    cmds:
      - cmake -S . -B build -Uembree_DIR -UTBB_DIR -UCMAKE_PREFIX_PATH
      - cmake --build build -j

  test:system:
    desc: Build and test against system-installed Embree/TBB (apt/brew)
    cmds:
      - cmake -S . -B build -Uembree_DIR -UTBB_DIR -UCMAKE_PREFIX_PATH
      - cmake --build build -j
      - ctest --test-dir build --output-on-failure

  render:
    desc: 'Render data/test1.pov (extra args: task render -- --supersample 4)'
    cmds:
      - ./build/umbreon_cli data/test1.pov -o out.png {{.CLI_ARGS}}

  clean:
    desc: Remove build artifacts and rendered images
    cmds:
      - rm -rf build
      - rm -f out*.png *.ppm

  clean:deps:
    desc: Remove downloaded sources and built static libraries
    cmds:
      - rm -rf deps
