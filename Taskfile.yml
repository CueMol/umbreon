version: '3'

# Tasks for the umbreon Embree renderer + benchmark CLI.
# Requires go-task (https://taskfile.dev): brew install go-task

tasks:
  deps:
    desc: Install dependencies (Embree 4 + TBB; POV-Ray only to regenerate references)
    cmds:
      - |
        if [ "{{OS}}" = "darwin" ]; then
          brew install embree tbb povray
        elif command -v apt-get >/dev/null 2>&1; then
          sudo apt-get install -y libembree-dev libtbb-dev povray
        else
          echo "Unsupported platform; install Embree 4, TBB and (optionally) POV-Ray manually." >&2
          exit 1
        fi

  build:
    desc: Configure and build (Release)
    cmds:
      - cmake -S . -B build
      - cmake --build build

  test:
    desc: Build and run the unit / integration tests
    cmds:
      - cmake -S . -B build
      - cmake --build build
      - ctest --test-dir build --output-on-failure

  render:
    desc: 'Render data/test1.pov (extra args: task render -- --supersample 4)'
    deps: [build]
    cmds:
      - ./build/umbreon_cli data/test1.pov -o out.png {{.CLI_ARGS}}

  clean:
    desc: Remove build artifacts and rendered images
    cmds:
      - rm -rf build
      - rm -f out*.png *.ppm
