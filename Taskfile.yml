version: '3'

# Tasks for the umbreon Embree renderer + benchmark CLI.
# Requires go-task (https://taskfile.dev): brew install go-task
# Also requires Ninja and a C++17 compiler (on Windows: an MSVC environment).

env:
  # Build with Ninja (single-config) on every OS. The Windows default generator
  # is Visual Studio (multi-config), whose default config is Debug; linking that
  # against the prebuilt Release deplibs mixes CRTs. Ninja honors
  # CMAKE_BUILD_TYPE=Release, matching the static libs on all platforms. Export
  # CMAKE_GENERATOR yourself to override.
  CMAKE_GENERATOR:
    sh: 'echo "${CMAKE_GENERATOR:-Ninja}"'

vars:
  EMBREE_VERSION: "4.4.1"
  TBB_VERSION: "2023.0.0"
  DEPS_SRC: "{{.ROOT_DIR}}/deps/src"
  DEPS_PREFIX: "{{.ROOT_DIR}}/deps/prefix"
  # CueMol2 deplibs: prebuilt static Embree/TBB for Linux x64, macOS x64/arm64
  # and Windows x64. The embree/tbb versions inside the bundle match
  # EMBREE_VERSION/TBB_VERSION above, and each ships its own CMake package config
  # under <prefix>/lib/cmake.
  DEPLIBS_VERSION: "v0.0.9"
  DEPLIBS_DIR: "{{.ROOT_DIR}}/deps/deplibs"
  EMBREE_PREFIX: "{{.DEPLIBS_DIR}}/target/embree-{{.EMBREE_VERSION}}"
  TBB_PREFIX: "{{.DEPLIBS_DIR}}/target/tbb-{{.TBB_VERSION}}"
  STATIC_PREFIX_PATH: "{{.EMBREE_PREFIX}};{{.TBB_PREFIX}}"

tasks:
  deps:
    desc: Install dependencies (Embree 4 + TBB; POV-Ray only to regenerate references)
    cmds:
      - |
        if [ "{{OS}}" = "darwin" ]; then
          brew install embree tbb ninja povray
        elif command -v apt-get >/dev/null 2>&1; then
          sudo apt-get install -y libembree-dev libtbb-dev ninja-build povray
        else
          echo "Unsupported platform; install Embree 4, TBB, Ninja and (optionally) POV-Ray manually." >&2
          exit 1
        fi

  deps:fetch:
    desc: Download CueMol2 deplibs (prebuilt static Embree {{.EMBREE_VERSION}} + TBB {{.TBB_VERSION}}) into deps/deplibs
    cmds:
      # deplibs is published for Linux x64, macOS x64/arm64 and Windows x64.
      # Select the matching bundle; fall back with a hint on other platforms.
      # Download to a file and unpack with `cmake -E tar` (libarchive) instead of
      # piping into the shell's tar: go-task's built-in shell uses its own tar on
      # Windows that rejects the bare `tar xj` form, and cmake is required anyway.
      - |
        case "{{OS}}/{{ARCH}}" in
          linux/amd64)   asset=deplibs_Linux_X64.tar.bz2 ;;
          darwin/amd64)  asset=deplibs_macOS_X64.tar.bz2 ;;
          darwin/arm64)  asset=deplibs_macOS_ARM64.tar.bz2 ;;
          windows/amd64) asset=deplibs_Windows_X64.tar.bz2 ;;
          *)
            echo "No deplibs bundle is published for {{OS}}/{{ARCH}}." >&2
            echo "Use 'task deps:build' (build from source) or 'task deps' (system packages) instead." >&2
            exit 1 ;;
        esac
        # The bundle also carries CGAL etc.; umbreon only consumes embree/tbb.
        cmake -E make_directory "{{.DEPLIBS_DIR}}"
        curl -sL "https://github.com/CueMol/build_scripts/releases/download/{{.DEPLIBS_VERSION}}/$asset" -o "{{.DEPLIBS_DIR}}/deplibs.tar.bz2"
        cmake -E chdir "{{.DEPLIBS_DIR}}" cmake -E tar xjf "deplibs.tar.bz2"
        cmake -E remove "{{.DEPLIBS_DIR}}/deplibs.tar.bz2"
    status:
      # Windows ships import/static libs as embree4.lib/tbb.lib; Unix as .a files.
      - |
        if [ "{{OS}}" = "windows" ]; then
          test -f {{.EMBREE_PREFIX}}/lib/embree4.lib && test -f {{.TBB_PREFIX}}/lib/tbb.lib
        else
          test -f {{.EMBREE_PREFIX}}/lib/libembree4.a && test -f {{.TBB_PREFIX}}/lib/libtbb.a
        fi

  deps:build-tbb:
    desc: Build oneTBB {{.TBB_VERSION}} as a static library into deps/prefix
    cmds:
      - mkdir -p {{.DEPS_SRC}}
      - |
        if [ ! -d "{{.DEPS_SRC}}/oneTBB-{{.TBB_VERSION}}" ]; then
          curl -sL "https://github.com/uxlfoundation/oneTBB/archive/refs/tags/v{{.TBB_VERSION}}.tar.gz" \
            | tar xz -C {{.DEPS_SRC}}
        fi
      - >-
        cmake -S {{.DEPS_SRC}}/oneTBB-{{.TBB_VERSION}} -B {{.DEPS_SRC}}/oneTBB-{{.TBB_VERSION}}/build
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX={{.DEPS_PREFIX}}
        -DBUILD_SHARED_LIBS=OFF
        -DTBB_TEST=OFF
        -DTBB_STRICT=OFF
        -DCMAKE_POSITION_INDEPENDENT_CODE=ON
      - cmake --build {{.DEPS_SRC}}/oneTBB-{{.TBB_VERSION}}/build -j
      - cmake --install {{.DEPS_SRC}}/oneTBB-{{.TBB_VERSION}}/build
    status:
      - test -f {{.DEPS_PREFIX}}/lib/libtbb.a

  deps:build-embree:
    desc: Build Embree {{.EMBREE_VERSION}} as a static library into deps/prefix
    deps: [deps:build-tbb]
    cmds:
      - mkdir -p {{.DEPS_SRC}}
      - |
        if [ ! -d "{{.DEPS_SRC}}/embree-{{.EMBREE_VERSION}}" ]; then
          curl -sL "https://github.com/RenderKit/embree/archive/refs/tags/v{{.EMBREE_VERSION}}.tar.gz" \
            | tar xz -C {{.DEPS_SRC}}
        fi
      - >-
        cmake -S {{.DEPS_SRC}}/embree-{{.EMBREE_VERSION}} -B {{.DEPS_SRC}}/embree-{{.EMBREE_VERSION}}/build
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_INSTALL_PREFIX={{.DEPS_PREFIX}}
        -DCMAKE_PREFIX_PATH={{.DEPS_PREFIX}}
        -DBUILD_SHARED_LIBS=OFF
        -DEMBREE_STATIC_LIB=ON
        -DEMBREE_TUTORIALS=OFF
        -DEMBREE_ISPC_SUPPORT=OFF
        -DCMAKE_POSITION_INDEPENDENT_CODE=ON
      - cmake --build {{.DEPS_SRC}}/embree-{{.EMBREE_VERSION}}/build -j
      - cmake --install {{.DEPS_SRC}}/embree-{{.EMBREE_VERSION}}/build
    status:
      - test -f {{.DEPS_PREFIX}}/lib/libembree4.a

  deps:build:
    desc: Build both TBB and Embree as static libraries into deps/prefix
    deps: [deps:build-embree]

  build:static:
    desc: Build umbreon against static Embree/TBB (deplibs on Linux/macOS/Windows x64 + macOS arm64, source build elsewhere)
    cmds:
      - |
        set -e
        case "{{OS}}/{{ARCH}}" in
          linux/amd64|darwin/amd64|darwin/arm64|windows/amd64)
            task deps:fetch
            PREFIX="{{.STATIC_PREFIX_PATH}}" ;;
          *)
            task deps:build
            PREFIX="{{.DEPS_PREFIX}}" ;;
        esac
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
        cmake --build build -j

  test:static:
    desc: Build and test against static Embree/TBB (deplibs on Linux/macOS/Windows x64 + macOS arm64, source build elsewhere)
    cmds:
      - |
        set -e
        case "{{OS}}/{{ARCH}}" in
          linux/amd64|darwin/amd64|darwin/arm64|windows/amd64)
            task deps:fetch
            PREFIX="{{.STATIC_PREFIX_PATH}}" ;;
          *)
            task deps:build
            PREFIX="{{.DEPS_PREFIX}}" ;;
        esac
        cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
        cmake --build build -j
        ctest --test-dir build --output-on-failure

  build:
    desc: Configure and build (Release)
    cmds:
      - cmake -S . -B build
      - cmake --build build -j

  test:
    desc: Build and run the unit / integration tests
    cmds:
      - cmake -S . -B build
      - cmake --build build -j
      - ctest --test-dir build --output-on-failure

  render:
    desc: 'Render data/test1.pov (extra args: task render -- --supersample 4)'
    cmds:
      - ./build/umbreon_cli data/test1.pov -o out.png {{.CLI_ARGS}}

  clean:
    desc: Remove build artifacts and rendered images
    cmds:
      - rm -rf build
      - rm -f out*.png *.ppm

  clean:deps:
    desc: Remove downloaded sources and built static libraries
    cmds:
      - rm -rf deps
